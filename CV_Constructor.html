<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Constructor — Créateur de CV Professionnel</title>
    <meta name="description" content="Créez, modifiez et exportez votre CV professionnel au format HTML et PDF.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== TOOLBAR ==================== -->
    <header id="toolbar">
        <div class="toolbar-brand">
            <span class="brand-icon">📄</span>
            <span class="brand-text">CV Constructor</span>
        </div>

        <div class="toolbar-actions">
            <button class="toolbar-btn" id="btn-new" title="Créer un nouveau CV vide">
                <span class="btn-icon">✨</span> Nouveau
            </button>
            <button class="toolbar-btn" id="btn-load" title="Charger un fichier CV .html existant">
                <span class="btn-icon">📂</span> Charger
            </button>
            <div class="toolbar-separator"></div>
            <button class="toolbar-btn btn-primary" id="btn-export-html" title="Télécharger le CV au format HTML">
                <span class="btn-icon">💾</span> Exporter HTML
            </button>
            <button class="toolbar-btn btn-accent" id="btn-export-pdf" title="Imprimer ou enregistrer en PDF">
                <span class="btn-icon">🖨️</span> Exporter PDF
            </button>
        </div>

        <div class="color-picker">
            <span class="color-picker-label">Accent :</span>
            <div class="color-options" id="color-options">
                <button class="color-swatch" data-color="#0284c7" style="background:#0284c7;color:#0284c7" title="Sky Blue"></button>
                <button class="color-swatch" data-color="#2563eb" style="background:#2563eb;color:#2563eb" title="Royal Blue"></button>
                <button class="color-swatch" data-color="#0d9488" style="background:#0d9488;color:#0d9488" title="Teal"></button>
                <button class="color-swatch" data-color="#4f46e5" style="background:#4f46e5;color:#4f46e5" title="Indigo"></button>
                <button class="color-swatch" data-color="#059669" style="background:#059669;color:#059669" title="Emerald"></button>
                <button class="color-swatch" data-color="#e11d48" style="background:#e11d48;color:#e11d48" title="Rose"></button>
                <button class="color-swatch" data-color="#d97706" style="background:#d97706;color:#d97706" title="Amber"></button>
                <button class="color-swatch" data-color="#7c3aed" style="background:#7c3aed;color:#7c3aed" title="Violet"></button>
                <div class="color-separator"></div>
                <div class="color-custom" title="Couleur personnalisée">
                    <input type="color" id="custom-color" value="#2563eb">
                </div>
            </div>
        </div>
    </header>

    <!-- ==================== EDITOR AREA ==================== -->
    <main id="editor-area">
        <div class="cv-container" id="cv-container">
            <!-- Rendered dynamically -->
        </div>
    </main>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept=".html,.htm" hidden>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="app.js" defer></script>
</body>
</html>
