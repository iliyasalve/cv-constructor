<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Solid Dark Background matching the site's dark mode -->
  <rect width="512" height="512" fill="#120a0c"/>
  
  <!-- Outer Dotted/Dashed Orbit Path -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4, 4" opacity="0.1" />
  <circle cx="256" cy="256" r="225" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.05" />

  <!-- Central bracket logo { IG : dev } -->
  <g transform="translate(256, 256)" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="700">
    <!-- Left Bracket -->
    <text x="-110" y="18" font-size="64" fill="#ffffff" opacity="0.3" font-weight="200" text-anchor="middle">{</text>
    
    <!-- IG -->
    <text x="-50" y="13" font-size="46" fill="#b3395d" text-anchor="middle">IG</text>
    
    <!-- Colon -->
    <text x="0" y="11" font-size="38" fill="#ffffff" opacity="0.3" text-anchor="middle">:</text>
    
    <!-- dev -->
    <text x="55" y="13" font-size="46" fill="#ffffff" opacity="0.8" font-weight="500" text-anchor="middle">dev</text>
    
    <!-- Right Bracket -->
    <text x="110" y="18" font-size="64" fill="#ffffff" opacity="0.3" font-weight="200" text-anchor="middle">}</text>
  </g>

  <!-- Circular typography wrapping around the logo -->
  <path id="textPathOrbit" d="M 256,71 A 185,185 0 1,1 255.9,71" fill="none" stroke="none" />
  
  <text font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff" opacity="0.45" letter-spacing="3.1">
    <textPath href="#textPathOrbit" startOffset="0%">
      PYTHON  •  DJANGO  •  FASTAPI  •  REACT  •  NEXT.JS  •  SQL  •  POSTGRESQL  •  DOCKER  •  MOBILE DEV  •  DATA ANALYTICS  •  MACHINE LEARNING  •  PANDAS  •  
    </textPath>
  </text>
</svg>
